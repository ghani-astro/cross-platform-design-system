<!doctype html>
<html lang="en" style="color-scheme: dark light">
<head>
<meta charset="utf-8">
<title>Nova — Sign in</title>
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="theme-color" content="#1a1612" media="(prefers-color-scheme: dark)">
<meta name="theme-color" content="#f7f5f0" media="(prefers-color-scheme: light)">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-canvas:      oklch(15% 0.005 60);
    --bg-surface:     oklch(18.5% 0.006 60);
    --bg-elevated:    oklch(22% 0.007 60);
    --bg-sunken:      oklch(12% 0.004 60);
    --border-subtle:  oklch(25% 0.008 60);
    --border-default: oklch(32% 0.010 60);
    --text-primary:   oklch(96% 0.005 80);
    --text-secondary: oklch(72% 0.008 70);
    --text-tertiary:  oklch(55% 0.008 70);
    --accent:         oklch(88% 0.18 130);
    --accent-fg:      oklch(15% 0.005 60);
    --danger:         oklch(70% 0.18 25);
    --font-display:   "Geist", system-ui, sans-serif;
    --font-body:      "Geist", system-ui, sans-serif;
    --font-mono:      "JetBrains Mono", ui-monospace, monospace;
  }
  @media (prefers-color-scheme: light) {
    :root {
      --bg-canvas:      oklch(98.5% 0.004 80);
      --bg-surface:     oklch(96% 0.005 80);
      --bg-elevated:    oklch(99% 0.003 80);
      --bg-sunken:      oklch(93% 0.006 80);
      --border-subtle:  oklch(89% 0.006 80);
      --border-default: oklch(82% 0.007 80);
      --text-primary:   oklch(20% 0.008 70);
      --text-secondary: oklch(40% 0.009 70);
      --text-tertiary:  oklch(55% 0.008 70);
      --accent:         oklch(62% 0.18 130);
      --accent-fg:      oklch(99% 0.003 80);
    }
  }

  *, *::before, *::after { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; background: var(--bg-canvas); color: var(--text-primary); font-family: var(--font-body); -webkit-font-smoothing: antialiased; }

  /* ═══════════════════════════════════════════════════════════════════════
     Floating mesh gradient blob constellation.
     4 large soft-blurred radial blobs drift independently in slow orbital
     paths (18–32s loops). Subtle cursor parallax shifts the whole stage
     ±8px via --mx/--my CSS vars. Pure CSS — no WebGL, no canvas, no JS
     animation loop. Reduce-motion users get static layout.
     ═══════════════════════════════════════════════════════════════════════ */
  .stage {
    position: fixed; inset: 0; pointer-events: none; z-index: 0;
    overflow: hidden;
    transform: translate3d(calc(var(--mx, 0) * 1px), calc(var(--my, 0) * 1px), 0);
    transition: transform 600ms cubic-bezier(0.16, 1, 0.3, 1);
  }
  .blob {
    position: absolute;
    border-radius: 50%;
    filter: blur(80px);
    opacity: 0.55;
    will-change: transform;
  }
  .blob.b1 { width: 520px; height: 520px; top: -120px; left: -100px;
    background: radial-gradient(circle, oklch(72% 0.20 130), transparent 60%);
    animation: drift-1 14s ease-in-out infinite alternate; }
  .blob.b2 { width: 440px; height: 440px; top: 12%;   right: -120px;
    background: radial-gradient(circle, oklch(64% 0.18 235), transparent 60%);
    animation: drift-2 16s ease-in-out infinite alternate; opacity: 0.55; }
  .blob.b3 { width: 580px; height: 580px; bottom: -160px; right: 8%;
    background: radial-gradient(circle, oklch(68% 0.18 30), transparent 60%);
    animation: drift-3 12s ease-in-out infinite alternate; opacity: 0.55; }
  .blob.b4 { width: 380px; height: 380px; bottom: 4%; left: 18%;
    background: radial-gradient(circle, oklch(60% 0.16 320), transparent 60%);
    animation: drift-4 10s ease-in-out infinite alternate; opacity: 0.50; }
  /* Translate range 3× larger + 2× faster — drift is visible at a glance, not subtle. */
  @keyframes drift-1 {
    0%   { transform: translate(0, 0) scale(1); }
    50%  { transform: translate(180px, 220px) scale(1.2); }
    100% { transform: translate(-140px, 120px) scale(0.85); }
  }
  @keyframes drift-2 {
    0%   { transform: translate(0, 0) scale(1); }
    50%  { transform: translate(-220px, 180px) scale(1.25); }
    100% { transform: translate(140px, -160px) scale(0.8); }
  }
  @keyframes drift-3 {
    0%   { transform: translate(0, 0) scale(1); }
    50%  { transform: translate(160px, -200px) scale(1.15); }
    100% { transform: translate(-180px, -100px) scale(1.3); }
  }
  @keyframes drift-4 {
    0%   { transform: translate(0, 0) scale(1); }
    50%  { transform: translate(-160px, -220px) scale(0.75); }
    100% { transform: translate(200px, 150px) scale(1.25); }
  }
  /* Soft grain overlay for premium depth */
  .grain {
    position: fixed; inset: 0; pointer-events: none; z-index: 0;
    opacity: 0.04; mix-blend-mode: overlay;
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='160' height='160'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='2' stitchTiles='stitch'/></filter><rect width='160' height='160' filter='url(%23n)' opacity='0.85'/></svg>");
    background-size: 160px;
  }
  /* Glow ring that subtly follows cursor — pulse + parallax */
  .spotlight {
    position: fixed; inset: 0; pointer-events: none; z-index: 0;
    background: radial-gradient(circle 280px at calc(50% + (var(--mx, 0) * 2.4px)) calc(50% + (var(--my, 0) * 2.4px)),
                                color-mix(in oklab, var(--accent) 14%, transparent), transparent 70%);
    transition: background 400ms ease-out;
    mix-blend-mode: screen;
  }
  /* Reduce-motion users get static layout — blobs hold position, no drift, no parallax. */
  @media (prefers-reduced-motion: reduce) {
    .blob { animation: none !important; }
    .stage { transition: none !important; }
    .spotlight { transition: none !important; }
  }

  /* Layout */
  .shell { position: relative; min-height: 100vh; display: grid; place-items: center; padding: 32px 20px; z-index: 1; }
  .card { width: 100%; max-width: 420px; background: var(--bg-elevated); border: 1px solid var(--border-default); border-radius: 14px; padding: 32px; box-shadow: 0 24px 60px rgba(0,0,0,.35), 0 0 0 1px color-mix(in oklab, var(--accent) 8%, transparent); }

  /* Brand */
  .brand { display: flex; align-items: center; gap: 10px; margin-bottom: 28px; position: relative; }
  .brand .mark { width: 32px; height: 32px; border-radius: 7px; background: var(--accent); color: var(--accent-fg); display: inline-flex; align-items: center; justify-content: center; font-family: var(--font-display); font-weight: 700; font-size: 15px; box-shadow: 0 4px 16px color-mix(in oklab, var(--accent) 30%, transparent); }
  .brand .name { font-size: 14px; font-weight: 600; letter-spacing: -.01em; }
  .brand .sub { font-family: var(--font-mono); font-size: 10px; color: var(--text-tertiary); letter-spacing: .08em; margin-top: 2px; }
  /* Decorative italic accent — character mark that hints at brand language. */
  .brand::after { content: "/"; position: absolute; right: 0; top: 50%; transform: translateY(-50%); font-family: var(--font-display); font-style: italic; font-weight: 300; font-size: 28px; color: color-mix(in oklab, var(--accent) 35%, transparent); pointer-events: none; user-select: none; line-height: 1; }

  h1 { font-family: var(--font-display); font-weight: 600; font-size: 24px; letter-spacing: -.02em; margin: 0 0 6px; }
  .lede { font-size: 13.5px; color: var(--text-secondary); margin: 0 0 24px; }

  /* Form */
  .field { display: flex; flex-direction: column; gap: 6px; margin-bottom: 14px; }
  .field-label { font-family: var(--font-mono); font-size: 10px; letter-spacing: .1em; color: var(--text-secondary); text-transform: uppercase; }
  .input { background: var(--bg-sunken); border: 1px solid var(--border-default); color: var(--text-primary); padding: 10px 12px; border-radius: 7px; font: inherit; font-size: 13px; width: 100%; outline: 0; transition: border-color .12s, box-shadow .12s; touch-action: manipulation; }
  .input:focus-visible { border-color: var(--accent); box-shadow: 0 0 0 3px color-mix(in oklab, var(--accent) 22%, transparent); outline: 0; }
  .input.err { border-color: var(--danger); }
  .err-msg { color: var(--danger); font-size: 11.5px; margin-top: 4px; font-family: var(--font-mono); }

  .btn { background: var(--accent); color: var(--accent-fg); border: 1px solid var(--accent); padding: 0 14px; height: 40px; border-radius: 7px; font: inherit; font-size: 13px; font-weight: 600; cursor: pointer; width: 100%; display: inline-flex; align-items: center; justify-content: center; gap: 8px; transition: transform .08s ease, box-shadow .12s ease, background .12s ease; touch-action: manipulation; }
  .btn:hover { transform: translateY(-1px); }
  .btn:active { transform: translateY(0); }
  .btn:focus-visible { outline: 0; box-shadow: 0 0 0 3px color-mix(in oklab, var(--accent) 32%, transparent), 0 0 0 1px var(--accent); }
  .btn[disabled] { opacity: .55; cursor: not-allowed; transform: none; }
  .btn svg { width: 15px; height: 15px; stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }

  .btn.secondary { background: transparent; color: var(--text-primary); border-color: var(--border-default); }
  .btn.secondary:hover { background: var(--bg-surface); }
  .btn.secondary:focus-visible { box-shadow: 0 0 0 3px color-mix(in oklab, var(--accent) 22%, transparent); border-color: var(--accent); }

  .divider { display: flex; align-items: center; gap: 12px; margin: 20px 0 16px; font-family: var(--font-mono); font-size: 10px; letter-spacing: .12em; text-transform: uppercase; color: var(--text-tertiary); }
  .divider::before, .divider::after { content: ""; flex: 1; height: 1px; background: var(--border-subtle); }

  .foot { margin-top: 18px; text-align: center; font-size: 12.5px; color: var(--text-secondary); }
  .foot a { color: var(--accent); text-decoration: none; font-weight: 500; border-radius: 3px; padding: 1px 2px; }
  .foot a:hover { text-decoration: underline; }
  .foot a:focus-visible { outline: 0; box-shadow: 0 0 0 3px color-mix(in oklab, var(--accent) 22%, transparent); }

  /* Magic link sent state */
  .sent { text-align: center; padding: 8px 0 4px; }
  .sent-ico { width: 56px; height: 56px; border-radius: 14px; background: color-mix(in oklab, var(--accent) 18%, transparent); border: 1px solid color-mix(in oklab, var(--accent) 50%, var(--border-default)); display: inline-flex; align-items: center; justify-content: center; margin-bottom: 18px; }
  .sent-ico svg { width: 28px; height: 28px; stroke: var(--accent); fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
  .sent h2 { font-family: var(--font-display); font-size: 18px; margin: 0 0 6px; font-weight: 600; }
  .sent p { font-size: 13px; color: var(--text-secondary); margin: 0 0 22px; line-height: 1.5; }
  .sent code { font-family: var(--font-mono); font-size: 12px; background: var(--bg-sunken); padding: 2px 6px; border-radius: 4px; color: var(--text-primary); }
  .demo-hint { font-family: var(--font-mono); font-size: 10px; letter-spacing: .08em; color: var(--text-tertiary); text-transform: uppercase; margin-top: 14px; }
</style>
</head>

<body>
  <!-- Mesh blob constellation — pure CSS animated background. 4 floating blobs + cursor parallax. -->
  <div class="stage" aria-hidden="true">
    <div class="blob b1"></div>
    <div class="blob b2"></div>
    <div class="blob b3"></div>
    <div class="blob b4"></div>
  </div>
  <div class="spotlight" aria-hidden="true"></div>
  <div class="grain" aria-hidden="true"></div>

  <div class="shell">
    <div class="card" id="card">
      <!-- Step 1: email form (default) -->
      <div id="step-email">
        <div class="brand">
          <div class="mark">B</div>
          <div>
            <div class="name">Nova</div>
            <div class="sub">design-tokens · v0</div>
          </div>
        </div>

        <h1>Welcome back</h1>
        <p class="lede">Enter your email to receive a magic link. No password to remember.</p>

        <form id="form-email" novalidate>
          <div class="field">
            <label class="field-label" for="email">Email</label>
            <input id="email" class="input" type="email" inputmode="email" placeholder="you@studio.com …" autocomplete="email" spellcheck="false" required>
            <div class="err-msg" id="err" hidden></div>
          </div>

          <button class="btn" type="submit">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M4 4h16v16H4z"/><path d="M4 8l8 5 8-5"/></svg>
            Send Magic Link
          </button>
        </form>

        <div class="divider">or</div>

        <p class="foot" style="margin-top:0">
          New here? <a href="/register.html">Create your account →</a>
        </p>
      </div>

      <!-- Step 2: sent (revealed after submit) -->
      <div id="step-sent" hidden>
        <div class="sent">
          <div class="sent-ico">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M4 4h16v16H4z"/><path d="M4 8l8 5 8-5"/></svg>
          </div>
          <h2>Check Your Email</h2>
          <p aria-live="polite">We sent a magic link to <code id="email-echo" translate="no">you@studio.com</code>. Click it to sign in. The link expires in 10&nbsp;minutes.</p>

          <button class="btn" id="btn-continue">
            Open Demo Workspace
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M5 12h14M13 5l7 7-7 7"/></svg>
          </button>
          <div class="demo-hint">Mock auth — no real email sent</div>
        </div>
      </div>
    </div>
  </div>

<script>
  // Cursor parallax for mesh stage — updates --mx/--my (in px units, range ±12).
  // Used by .stage translate3d + .spotlight radial-gradient offset.
  // Note: reduce-motion guard removed — parallax runs regardless of OS setting.
  (function setupParallax() {
    let raf = null;
    document.addEventListener('mousemove', (e) => {
      if (raf) return;
      raf = requestAnimationFrame(() => {
        const x = ((e.clientX / window.innerWidth) - 0.5) * 24;   // ±12 px
        const y = ((e.clientY / window.innerHeight) - 0.5) * 24;
        document.documentElement.style.setProperty('--mx', x.toFixed(2));
        document.documentElement.style.setProperty('--my', y.toFixed(2));
        raf = null;
      });
    }, { passive: true });
  })();

  // If user already has a session, skip straight to dashboard
  try {
    const existing = JSON.parse(localStorage.getItem('bb.session'));
    if (existing && existing.activeWorkspaceId) {
      window.location.replace('/dashboard.html');
    }
  } catch (e) {}

  const stepEmail = document.getElementById('step-email');
  const stepSent  = document.getElementById('step-sent');
  const form      = document.getElementById('form-email');
  const emailEl   = document.getElementById('email');
  const errEl     = document.getElementById('err');
  const echoEl    = document.getElementById('email-echo');
  const btnContinue = document.getElementById('btn-continue');

  let pendingEmail = '';

  function isEmail(v) { return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(v); }

  form.addEventListener('submit', (e) => {
    e.preventDefault();
    const v = emailEl.value.trim();
    if (!isEmail(v)) {
      emailEl.classList.add('err');
      errEl.textContent = 'Enter a valid email address';
      errEl.hidden = false;
      return;
    }
    emailEl.classList.remove('err');
    errEl.hidden = true;
    pendingEmail = v;
    echoEl.textContent = v;
    stepEmail.hidden = true;
    stepSent.hidden = false;
  });

  btnContinue.addEventListener('click', () => {
    // Mock: existing user? If yes, restore session. Otherwise create a minimal one.
    let session = null;
    try { session = JSON.parse(localStorage.getItem('bb.session')); } catch (e) {}

    if (!session || session.user?.email !== pendingEmail) {
      // Bootstrap minimal session for an unknown email — sends to onboarding
      session = {
        user: {
          email: pendingEmail,
          name: pendingEmail.split('@')[0],
          createdAt: new Date().toISOString().slice(0, 10),
        },
        workspaces: [],
        activeWorkspaceId: null,
      };
      localStorage.setItem('bb.session', JSON.stringify(session));
      window.location.href = '/onboarding.html';
      return;
    }

    // Returning user with workspaces → dashboard
    window.location.href = '/dashboard.html';
  });
</script>
</body>
</html>
